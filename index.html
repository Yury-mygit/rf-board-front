<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveNotes — Доска</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app">
    <header>
      <span class="logo">Доска</span>
      <span id="status"></span>
    </header>
    <main>
      <section id="board">
        <aside class="board-sidebar">
          <div id="board-list"><div class="hint">Загрузка…</div></div>
          <div class="board-sidebar-toolbar">
            <button id="new-board-btn" title="Создать доску">+ Новая доска</button>
          </div>
        </aside>
        <div id="board-sidebar-backdrop" class="board-sidebar-backdrop"></div>
        <div class="board-content">
          <button id="board-sidebar-toggle" class="board-sidebar-toggle" title="Список досок" aria-label="Список досок">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
          </button>
          <div class="board-tools">
            <button class="board-tool" data-tool="line" title="Линия" aria-label="Линия">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="19" x2="19" y2="5"/></svg>
            </button>
            <button class="board-tool" data-tool="rect" title="Прямоугольник" aria-label="Прямоугольник">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="6" width="16" height="12" rx="1"/></svg>
            </button>
            <button class="board-tool" data-tool="text" title="Текст" aria-label="Текст">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="6"/><line x1="12" y1="6" x2="12" y2="19"/></svg>
            </button>
            <button class="board-tool" data-tool="note" title="Заметка" aria-label="Заметка">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><path d="M5 4h11l3 3v13H5z"/><path d="M16 4v3h3"/></svg>
            </button>
            <button class="board-tool" data-tool="frame" title="Фрейм" aria-label="Фрейм">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V6a2 2 0 0 1 2-2h3"/><path d="M15 4h3a2 2 0 0 1 2 2v3"/><path d="M20 15v3a2 2 0 0 1-2 2h-3"/><path d="M9 20H6a2 2 0 0 1-2-2v-3"/></svg>
            </button>
            <button class="board-tool" data-tool="image" title="Картинка (URL)" aria-label="Картинка">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="1.5" fill="currentColor"/><path d="m3 17 5-5 4 4 3-3 6 6"/></svg>
            </button>
            <button class="board-tool" data-tool="image-file" title="Картинка с ПК" aria-label="Картинка с ПК">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="9" cy="11" r="1.5" fill="currentColor"/><path d="m3 17 5-5 4 4 3-3 6 6"/><path d="M17 3v6"/><path d="m14 6 3-3 3 3"/></svg>
            </button>
            <button id="bpmn-tool-btn" class="board-tool" title="BPMN" aria-label="BPMN" aria-haspopup="menu">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><circle cx="5" cy="6" r="2"/><rect x="10" y="4" width="10" height="4" rx="1"/><circle cx="5" cy="18" r="2"/><path d="M5 8v8"/><path d="M15 8v6"/><path d="m13 16 2 2-2 2"/><path d="M7 18h6"/></svg>
            </button>
          </div>
          <div id="bpmn-popover" class="board-tool-popover" role="menu">
            <button class="bpmn-pop-item" data-tool="bpmn_event" title="Событие">
              <span class="pop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="8"/></svg></span>
              <span>Событие</span>
            </button>
            <button class="bpmn-pop-item" data-tool="bpmn_task" title="Задача">
              <span class="pop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="7" width="18" height="10" rx="2"/></svg></span>
              <span>Задача</span>
            </button>
            <button class="bpmn-pop-item" data-tool="bpmn_gateway" title="Шлюз">
              <span class="pop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><polygon points="12,3 21,12 12,21 3,12"/></svg></span>
              <span>Шлюз</span>
            </button>
            <button class="bpmn-pop-item" data-tool="bpmn_flow" title="Поток (соединение): кликни источник, затем цель">
              <span class="pop-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h14"/><path d="m14 7 5 5-5 5"/></svg></span>
              <span>Поток</span>
            </button>
          </div>
          <div id="board-canvas" class="board-canvas"></div>
          <div id="board-zoom-ctl" class="board-zoom-ctl">
            <button id="zoom-out-btn" type="button" title="Уменьшить">−</button>
            <button id="zoom-fit-btn" type="button" title="Вписать всё">⤢</button>
            <button id="zoom-in-btn" type="button" title="Увеличить">+</button>
            <span id="zoom-indicator" title="Текущий масштаб">100%</span>
          </div>
          <div id="frame-copy-menu" class="frame-copy-menu" style="display:none">
            <button data-format="html">Ссылка на HTML</button>
            <button data-format="png">Ссылка на картинку</button>
          </div>
          <div id="board-context-menu" class="board-context-menu" style="display:none">
            <div id="ctx-toolbar-rect" class="ctx-toolbar" style="display:none">
              <button id="ctx-fill-btn" class="ctx-tool" title="Заливка">
                <span class="ctx-tool-fill"></span>
              </button>
              <button id="ctx-stroke-btn" class="ctx-tool" title="Граница">
                <span class="ctx-tool-stroke"></span>
              </button>
              <span class="ctx-sep"></span>
              <label class="ctx-num-label" title="Радиус скругления">
                rx
                <input id="ctx-rx" class="ctx-num-input" type="number" min="0" max="64" step="1" value="4"/>
              </label>
              <label class="ctx-num-label" title="Толщина рамки">
                sw
                <input id="ctx-sw" class="ctx-num-input" type="number" min="0" max="20" step="1" value="2"/>
              </label>
            </div>
            <div id="ctx-toolbar-line" class="ctx-toolbar" style="display:none">
              <button id="ctx-line-color-btn" class="ctx-tool" title="Цвет линии">
                <span class="ctx-tool-stroke"></span>
              </button>
              <span class="ctx-sep"></span>
              <label class="ctx-num-label" title="Толщина линии">
                sw
                <input id="ctx-line-sw" class="ctx-num-input" type="number" min="1" max="20" step="1" value="2"/>
              </label>
            </div>
            <div id="ctx-toolbar-bpmn" class="ctx-toolbar" style="display:none">
              <label class="ctx-num-label" title="Подпись">
                <input id="ctx-bpmn-label" class="ctx-bpmn-label" type="text" placeholder="Подпись"/>
              </label>
              <select id="ctx-bpmn-kind" class="ctx-bpmn-kind" title="Тип" style="display:none">
                <option value="">—</option>
              </select>
            </div>
            <div id="ctx-toolbar-text" class="ctx-toolbar" style="display:none">
              <button id="ctx-color-btn" class="ctx-tool" title="Цвет текста">
                <span class="ctx-tool-text-color">A<span class="ctx-color-bar"></span></span>
              </button>
              <span class="ctx-sep"></span>
              <button id="ctx-bold-btn" class="ctx-tool" title="Жирный"><span class="ctx-tool-bold">B</span></button>
              <button id="ctx-italic-btn" class="ctx-tool" title="Курсив"><span class="ctx-tool-italic">I</span></button>
              <button id="ctx-underline-btn" class="ctx-tool" title="Подчёркивание"><span class="ctx-tool-underline">U</span></button>
              <span class="ctx-sep"></span>
              <select id="ctx-size" class="ctx-size-select" title="Размер">
                <option value="10">10</option>
                <option value="12">12</option>
                <option value="14" selected>14</option>
                <option value="16">16</option>
                <option value="18">18</option>
                <option value="20">20</option>
                <option value="24">24</option>
                <option value="28">28</option>
                <option value="32">32</option>
                <option value="40">40</option>
                <option value="48">48</option>
              </select>
            </div>
            <div id="ctx-toolbar-zorder" class="ctx-toolbar">
              <button id="ctx-to-front-btn" class="ctx-tool" title="На передний план">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="8" width="12" height="12" rx="1"/><path d="M4 16V5a1 1 0 0 1 1-1h11"/></svg>
              </button>
              <button id="ctx-to-back-btn" class="ctx-tool" title="На задний план">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="12" height="12" rx="1"/><path d="M20 8v11a1 1 0 0 1-1 1H8"/></svg>
              </button>
            </div>
            <div id="ctx-palette" class="ctx-palette" style="display:none">
              <div id="ctx-opacity-row" class="ctx-opacity-row">
                <span class="ctx-opacity-label">Opacity</span>
                <input id="ctx-opacity" class="ctx-opacity-slider" type="range" min="0" max="100" value="100">
                <span id="ctx-opacity-val" class="ctx-opacity-val">100%</span>
              </div>
              <div id="ctx-grid" class="ctx-grid"></div>
            </div>
          </div>
        </div>
        <aside id="inspect-panel" class="inspect-panel" aria-label="Параметры элемента">
          <button id="inspect-toggle" class="inspect-toggle" title="Свернуть панель" aria-label="Свернуть панель">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <div class="ip-body">
            <div class="ip-empty">Выделите элемент, чтобы увидеть его свойства.</div>
          </div>
        </aside>
      </section>
    </main>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
